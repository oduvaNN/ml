dataset: cifar10
data_dir: data
num_batches: 10
test_batches: [0, 1]
seed: 42

model:
  num_classes: 10

training:
  num_epochs: 10
  batch_size: 128
  lr: 1.0e-3
  weight_decay: 1.0e-4
  lr_step_size: 5
  lr_gamma: 0.5

artifact_dir: artifacts

experiments:
  small:
    train_batches: [1, 2]
    val_batches: [3]
  medium:
    train_batches: [1, 2, 3, 4, 5]
    val_batches: [6]
  large:
    train_batches: [1, 2, 3, 4, 5, 6, 7, 8]
    val_batches: [9]
